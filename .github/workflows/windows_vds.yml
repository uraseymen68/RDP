name: Windows-VDS-Hatasiz

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
    - name: Ngrok Resmi Siteden Indiriliyor
      run: |
        $url = "https://bin.equinox.io/handler/ngrok/stable/windows_amd64.zip"
        $output = "ngrok.zip"
        Import-Module BitsTransfer
        Start-BitsTransfer -Source $url -Destination $output
        Expand-Archive ngrok.zip -DestinationPath ngrok_files
    - name: Ngrok Kimlik Dogrulama
      run: |
        .\ngrok_files\ngrok.exe authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
    - name: Uzak Masaustunu Aktif Et
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
    - name: Tunel Baslatiliyor
      run: |
        Start-Process .\ngrok_files\ngrok.exe -ArgumentList "tcp --region eu 3389"
        echo "VDS Basariyla Baslatildi! Ngrok panelinizden (Endpoints) adresi alin."
        Start-Sleep -Seconds 21600
